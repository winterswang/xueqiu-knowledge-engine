# xueqiu-knowledge-engine 配置

# LLM 配置
llm:
  provider: minimax
  model: minimax-m3
  max_tokens: 8192
  temperature: 0.1
  timeout: 120

# 知识库配置
knowledge:
  sources_dir: knowledge/sources
  entities_dir: knowledge/entities
  concepts_dir: knowledge/concepts
  index_file: knowledge/index.md
  log_file: knowledge/log.md

# Ingest 配置
ingest:
  concurrency: 1
  batch_size: 50
  min_article_length: 2000  # 跳过短文/快评
  required_fields:
    - title
    - url
    - date
    - author
  optional_fields:
    - source
    - tickers
    - entities
    - concepts
    - signals
    - quality_score
    - extraction_confidence

# 验证配置
validation:
  strict_required: true
  quality_threshold: 0.6
  alias_similarity_threshold: 0.85

# 词典配置
dictionary:
  entity_dict_file: config/entity_dictionary.yaml
  min_mention_count: 3
